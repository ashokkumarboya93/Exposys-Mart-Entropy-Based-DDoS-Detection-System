<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Exposys Mart Security</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card animate-in">
      <div class="login-logo"><svg viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
      <h1 class="login-title">Exposys Mart Admin</h1>
      <p class="login-subtitle">Security Analytics Dashboard</p>

      <div class="login-error" id="login-error">
        Invalid credentials. Please try again.
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" class="form-input" id="username" placeholder="Enter username" value="admin" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="login-btn" id="login-btn">
          🔐 Sign In
        </button>
      </form>

      <p style="margin-top: 24px; font-size: 0.75rem; color: var(--text-muted);">
        Demo credentials: <code style="background: var(--bg-input); padding: 2px 6px; border-radius: 4px;">admin</code> /
        <code style="background: var(--bg-input); padding: 2px 6px; border-radius: 4px;">admin123</code>
      </p>
    </div>
  </div>

  <script src="js/admin-api.js"></script>
  <script src="js/admin-auth.js"></script>
</body>
</html>
