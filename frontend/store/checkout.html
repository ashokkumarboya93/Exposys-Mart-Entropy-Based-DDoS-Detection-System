<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Exposys Mart</title>
  <link rel="stylesheet" href="css/store.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
</head>
<body class="store-body">

  <!-- Compact Header -->
  <header style="height: 60px; background: white; border-bottom: 1px solid var(--border); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; display: flex; align-items: center;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <a href="index.html" style="display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.1rem; color: var(--indigo-600); text-decoration: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Exposys Mart
      </a>
      <a href="cart.html" style="display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 700; color: var(--indigo-600);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Cart
      </a>
    </div>
  </header>

  <main class="container" style="margin-top: 80px; padding-bottom: 60px;">
    
    <div id="checkout-form" style="display: grid; grid-template-columns: 1.4fr 1fr; gap: 30px; max-width: 1000px; margin: 0 auto;">
      
      <!-- Left: Checkout Details -->
      <section>
        <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px;">
          <h2 style="margin: 0 0 20px 0; font-size: 1.3rem; color: var(--text-primary); font-weight: 800;">
            1. Shipping Information
          </h2>
          <form id="shipping-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div style="grid-column: 1 / -1;">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-input" placeholder="Enter your full name" required>
            </div>
            <div style="grid-column: 1 / -1;">
              <label class="form-label">Address</label>
              <input type="text" class="form-input" placeholder="House no, Street, Locality" required>
            </div>
            <div>
              <label class="form-label">City</label>
              <input type="text" class="form-input" placeholder="City" required>
            </div>
            <div>
              <label class="form-label">Postal Code</label>
              <input type="text" class="form-input" placeholder="PIN Code" required>
            </div>
          </form>
        </div>

        <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px;">
          <h2 style="margin: 0 0 20px 0; font-size: 1.3rem; color: var(--text-primary); font-weight: 800;">
            2. Payment Method
          </h2>
          <div style="display:grid; gap: 12px;">
            <div class="payment-opt active">
              <input type="radio" checked name="pay" id="pay-card">
              <label for="pay-card" style="display:flex; align-items:center; gap: 12px; width:100%; cursor:pointer;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                <div style="flex:1">
                  <div style="font-weight:700; font-size: 0.9rem;">Credit / Debit Card</div>
                  <div style="font-size: 0.75rem; color: var(--text-secondary);">Visa, Mastercard, RuPay</div>
                </div>
              </label>
            </div>
            <div class="payment-opt">
              <input type="radio" name="pay" id="pay-upi">
              <label for="pay-upi" style="display:flex; align-items:center; gap: 12px; width:100%; cursor:pointer;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <div style="flex:1">
                  <div style="font-weight:700; font-size: 0.9rem;">UPI (PhonePe, Google Pay)</div>
                  <div style="font-size: 0.75rem; color: var(--text-secondary);">Instant payment using UPI ID</div>
                </div>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- Right: Summary -->
      <aside>
        <div style="background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; position: sticky; top: 80px;">
          <h3 style="margin: 0 0 20px 0; font-size: 1.1rem; font-weight: 800;">Order Summary</h3>
          
          <div id="co-items" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding-right: 4px;">
            <!-- Items injected by JS -->
          </div>

          <div style="display:flex; justify-content: space-between; margin-bottom: 8px; font-size: .85rem; color: var(--text-secondary);">
            <span>Subtotal</span>
            <span id="co-subtotal">₹0</span>
          </div>
          <div style="display:flex; justify-content: space-between; margin-bottom: 8px; font-size: .85rem; color: var(--text-secondary);">
            <span>Shipping</span>
            <span style="color:var(--success); font-weight:700;">FREE</span>
          </div>
          <div style="display:flex; justify-content: space-between; margin-bottom: 20px; font-size: .85rem; color: var(--text-secondary);">
            <span>Estimated Tax</span>
            <span id="co-tax">₹0</span>
          </div>
          
          <div style="height: 1px; background: var(--border); margin-bottom: 20px;"></div>
          
          <div style="display:flex; justify-content: space-between; margin-bottom: 24px;">
            <span style="font-weight: 800; font-size: 1.1rem;">Total</span>
            <span id="co-total" style="font-weight: 800; font-size: 1.1rem; color: var(--indigo-700);">₹0</span>
          </div>

          <button id="place-order-btn" class="btn-hero-deals" style="width: 100%; height: 50px; font-size: 1rem; cursor: pointer;">
            Place Your Order
          </button>
          
          <p style="text-align: center; font-size: .7rem; color: var(--text-muted); margin-top: 16px;">
            Securely encrypted checkout.
          </p>
        </div>
      </aside>

    </div>

    <!-- Success Message -->
    <div id="order-success" style="display:none; text-align: center; padding: 80px 0;">
      <div style="width: 64px; height: 64px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; font-size: 1.5rem;">✓</div>
      <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 10px;">Order Placed!</h1>
      <p style="color: var(--text-secondary); margin-bottom: 24px;">
        Order Number: <strong id="order-id">...</strong>
      </p>
      <div style="display:flex; gap: 12px; justify-content: center;">
        <a href="index.html" class="btn btn-secondary btn-sm">Return Home</a>
        <button onclick="window.print()" class="btn btn-secondary btn-sm">Print Receipt</button>
      </div>
    </div>
  </main>

  <script src="js/store-api.js"></script>
  <script src="js/store-cart.js"></script>
  <script src="js/store-app.js"></script>

  <style>
    .form-label { display: block; font-size: .78rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 5px; }
    .form-input { 
      width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); 
      background: #f9fafb; color: var(--text-primary); font-size: .9rem; 
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input:focus { outline: none; border-color: var(--indigo-500); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .payment-opt {
      padding: 14px; border: 1.5px solid var(--border); border-radius: 8px; transition: all .2s;
    }
    .payment-opt.active { border-color: var(--indigo-500); background: rgba(79, 70, 229, 0.04); }
    .payment-opt input { display: none; }
    
    .btn-hero-deals {
      background: var(--gradient-btn-primary);
      color: white;
      border-radius: var(--r-pill);
      font-weight: 700;
      transition: all 0.2s;
    }
    .btn-hero-deals:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    @media (max-width: 900px) {
      .checkout-layout { grid-template-columns: 1fr; }
      aside { order: -1; }
    }
  </style>

</body>
</html>
