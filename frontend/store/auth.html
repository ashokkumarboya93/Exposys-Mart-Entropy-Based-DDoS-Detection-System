<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create your Exposys Mart account to shop securely.">
  <title>Login & Register — Exposys Mart</title>
  <link rel="stylesheet" href="css/store.css?v=2">
  <style>
    .auth-page { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; background:linear-gradient(135deg,#f5f3ff 0%,#ede9fe 50%,#fce7f3 100%); }
    .auth-card { background:#fff; border-radius:20px; padding:44px 40px; max-width:440px; width:100%; box-shadow:0 20px 60px rgba(79,70,229,0.12),0 2px 6px rgba(0,0,0,0.04); }
    .auth-card .brand { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
    .auth-card .brand-icon { width:36px; height:36px; }
    .auth-card .brand-name { font-size:1.4rem; font-weight:800; background:linear-gradient(135deg,#7C3AED,#DB2777); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-0.5px; }
    .auth-card .subtitle { text-align:center; color:#6b7280; font-size:0.85rem; margin-bottom:28px; }
    .auth-tabs { display:flex; gap:0; margin-bottom:28px; border-radius:10px; overflow:hidden; border:1px solid #e5e7eb; background:#f9fafb; }
    .auth-tab { flex:1; padding:11px; text-align:center; font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.2s; color:#9ca3af; background:transparent; border:none; }
    .auth-tab.active { background:#7C3AED; color:#fff; }
    .auth-card label { display:block; color:#374151; font-size:0.8rem; font-weight:600; margin-bottom:6px; }
    .auth-card input { width:100%; padding:12px 16px; background:#f9fafb; border:1.5px solid #e5e7eb; border-radius:10px; color:#111; font-size:0.92rem; margin-bottom:18px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; box-sizing:border-box; }
    .auth-card input:focus { border-color:#7C3AED; box-shadow:0 0 0 3px rgba(124,58,237,0.1); }
    .auth-card .btn-auth { width:100%; padding:14px; background:linear-gradient(135deg,#7C3AED,#DB2777); color:#fff; font-size:0.95rem; font-weight:700; border:none; border-radius:12px; cursor:pointer; transition:transform 0.15s,box-shadow 0.2s; }
    .auth-card .btn-auth:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(124,58,237,0.3); }
    .auth-card .btn-auth:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .auth-error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); color:#dc2626; padding:10px 14px; border-radius:8px; font-size:0.82rem; margin-bottom:16px; display:none; }
    .auth-error.visible { display:block; }
    .auth-success { background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2); color:#059669; padding:10px 14px; border-radius:8px; font-size:0.82rem; margin-bottom:16px; display:none; }
    .auth-success.visible { display:block; }
    .auth-footer { text-align:center; margin-top:24px; color:#9ca3af; font-size:0.78rem; }
    .auth-footer a { color:#7C3AED; text-decoration:none; font-weight:600; }
    .auth-footer a:hover { text-decoration:underline; }
    .auth-divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
    .auth-divider span { color:#d1d5db; font-size:0.75rem; white-space:nowrap; }
    .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:#e5e7eb; }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <!-- Brand -->
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFA1F7"/><stop offset="100%" stop-color="#B122FF"/></linearGradient></defs>
          <path d="M 35 35 V 25 C 35 15, 65 15, 65 25 V 35" stroke="#fce4fc" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M 15 35 L 20 90 C 20 95, 25 98, 30 98 H 70 C 75 98, 80 95, 80 90 L 85 35 C 85 30, 80 26, 75 26 H 25 C 20 26, 15 30, 15 35 Z" fill="url(#bg)"/>
          <path d="M 35 35 V 50 C 35 65, 65 65, 65 50 V 35" stroke="#fce4fc" stroke-width="8" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="brand-name">Exposys Mart</span>
      </div>
      <p class="subtitle">Your premium shopping destination</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
      </div>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-success" id="auth-success"></div>

      <!-- Login Form -->
      <form id="login-form">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="Enter your username" required>
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required>
        <button type="submit" class="btn-auth" id="login-btn">Sign In</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" style="display:none;">
        <label for="reg-fullname">Full Name</label>
        <input type="text" id="reg-fullname" placeholder="John Doe" required>
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" placeholder="john@example.com" required>
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username" required minlength="3">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Minimum 6 characters" required minlength="6">
        <button type="submit" class="btn-auth" id="register-btn">Create Account</button>
      </form>

      <div class="auth-divider"><span>Secured by Entropy Detection</span></div>

      <div class="auth-footer">
        <p>Demo: <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;">shopper</code> / <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;">shop123</code></p>
        <p style="margin-top:10px;"><a href="index.html">← Back to Store</a></p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.port === '8000'
      ? `${window.location.protocol}//${window.location.hostname}:8000`
      : 'http://127.0.0.1:8000';

    function switchTab(tab) {
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('auth-error').classList.remove('visible');
      document.getElementById('auth-success').classList.remove('visible');
    }

    // Redirect if already logged in
    if (localStorage.getItem('store_token')) {
      window.location.href = 'index.html';
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('auth-error');
      const succEl = document.getElementById('auth-success');
      errEl.classList.remove('visible');
      succEl.classList.remove('visible');

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value,
            password: document.getElementById('login-password').value,
          }),
        }).then(r => r.json());

        if (res.success && res.token) {
          localStorage.setItem('store_token', res.token);
          localStorage.setItem('store_user', JSON.stringify(res.user));
          window.location.href = 'index.html';
        } else {
          errEl.textContent = res.message || 'Invalid credentials';
          errEl.classList.add('visible');
        }
      } catch (err) {
        errEl.textContent = 'Server connection failed. Is the backend running?';
        errEl.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('auth-error');
      const succEl = document.getElementById('auth-success');
      errEl.classList.remove('visible');
      succEl.classList.remove('visible');

      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
            full_name: document.getElementById('reg-fullname').value,
          }),
        }).then(r => r.json());

        if (res.success && res.token) {
          localStorage.setItem('store_token', res.token);
          localStorage.setItem('store_user', JSON.stringify(res.user));
          succEl.textContent = 'Account created! Redirecting...';
          succEl.classList.add('visible');
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        } else {
          errEl.textContent = res.message || 'Registration failed';
          errEl.classList.add('visible');
        }
      } catch (err) {
        errEl.textContent = 'Server connection failed.';
        errEl.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
